spring.application.name=TeaPlanter
server.port=${PORT:8080}
spring.config.import=optional:file:env.BackEnd

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Error Handling
# Security
server.error.include-message=always
logging.level.org.hibernate.SQL=warn
logging.level.org.hibernate.type.descriptor.sql=warn
spring.mail.properties.mail.smtp.connectiontimeout=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_CONNECTIONTIMEOUT:10000}
spring.mail.properties.mail.smtp.timeout=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_TIMEOUT:10000}
spring.mail.properties.mail.smtp.writetimeout=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_WRITETIMEOUT:10000}

# Clerk JWK Set URI
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${CLERK_JWK_SET_URI}

# Clerk Backend API Secret Key
clerk.secret-key=${CLERK_SECRET_KEY}

# PayHere Subscription (Sandbox by default)
PAYHERE_MERCHANT_ID=${PAYHERE_MERCHANT_ID:}
PAYHERE_MERCHANT_SECRET=${PAYHERE_MERCHANT_SECRET:}
PAYHERE_SUBSCRIPTION_AMOUNT=${PAYHERE_SUBSCRIPTION_AMOUNT:990.00}
PAYHERE_SUBSCRIPTION_CURRENCY=${PAYHERE_SUBSCRIPTION_CURRENCY:LKR}
PAYHERE_SUBSCRIPTION_NAME=${PAYHERE_SUBSCRIPTION_NAME:Tea Planter Owner Subscription}
PAYHERE_SUBSCRIPTION_DURATION_DAYS=${PAYHERE_SUBSCRIPTION_DURATION_DAYS:30}
PAYHERE_SUBSCRIPTION_GRACE_DAYS=${PAYHERE_SUBSCRIPTION_GRACE_DAYS:1}
OWNER_SUBSCRIPTION_LAPSE_CRON=${OWNER_SUBSCRIPTION_LAPSE_CRON:0 0 * * * *}
OWNER_SUBSCRIPTION_REMINDER_CRON=${OWNER_SUBSCRIPTION_REMINDER_CRON:0 0 9 * * *}
PAYHERE_MANUAL_SETTLE_ENABLED=${PAYHERE_MANUAL_SETTLE_ENABLED:false}
PAYHERE_RETURN_URL=${PAYHERE_RETURN_URL:http://localhost:5174/owner-onboarding?payhere_return=1}
PAYHERE_CANCEL_URL=${PAYHERE_CANCEL_URL:http://localhost:5174/settings}
PAYHERE_NOTIFY_URL=${PAYHERE_NOTIFY_URL:http://localhost:8080/api/payhere/webhook}
PAYHERE_DEFAULT_COUNTRY=${PAYHERE_DEFAULT_COUNTRY:Sri Lanka}
PAYHERE_DEFAULT_CITY=${PAYHERE_DEFAULT_CITY:Colombo}
PAYHERE_DEFAULT_ADDRESS=${PAYHERE_DEFAULT_ADDRESS:Tea Planter}
PAYHERE_DEFAULT_PHONE=${PAYHERE_DEFAULT_PHONE:0770000000}
app.frontend.url=${FRONTEND_URL:http://localhost:5174}
